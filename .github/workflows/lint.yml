name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  html:
    name: HTML (htmlhint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx htmlhint "**/*.html"
