<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DaisyUI Buttondown Example - Basic</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="card card-bordered card-normal w-full max-w-sm mx-auto p-6 bg-base-100">
      <form
        action="https://buttondown.com/api/emails/embed-subscribe/{username}"
        method="post"
      >
        <div class="grid gap-4">
          <div>
            <h3 class="card-title text-2xl">Stay informed</h3>
            <p class="text-sm">
              You'll be the first to know when we launch.
            </p>
          </div>

          <div class="grid gap-2">
            <label for="email" class="label">
              <span class="label-text">Email</span>
            </label>
            <input
              class="input input-bordered w-full"
              id="email"
              name="email"
              type="email"
              placeholder="m@example.com"
              required
            />
          </div>

          <div class="card-actions">
            <button class="btn btn-primary w-full" type="submit">
              Subscribe
            </button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
