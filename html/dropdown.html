<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <title>Buttondown HTML Dropdown Form Example</title>
  <body>
    <div class="card">
      <form action="https://buttondown.com/api/emails/embed-subscribe/{username}" method="post">
        <h3>Stay informed</h3>
        <p>You'll be the first to know when we launch.</p>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="m@example.com" required />
        <label for="language">Language</label>
        <select id="language" name="tag">
          <option value="english">English</option>
          <option value="french">French</option>
          <option value="spanish">Spanish</option>
        </select>
        <button type="submit">Subscribe</button>
      </form>
    </div>
  </body>
</html>
