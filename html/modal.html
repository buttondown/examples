
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Buttondown Modal Subscription Form Example</title>
        <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #222;
  position: relative;
  min-height: 100vh;
  background-color: #b3e6f4;
}

.modal {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.4rem;
  width: 450px;
  padding: 1.3rem;
  min-height: 250px;
  position: absolute;
  z-index: 2;
  top: 20%;
  background-color: white;
  border: 1px solid #ddd;
  border-radius: 15px;
}

.modal .flex {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal input {
  padding: 0.7rem 1rem;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 0.9em;
}

.modal p {
  font-size: 0.9rem;
  color: #777;
  margin: 0.4rem 0 0.2rem;
}

button {
  cursor: pointer;
  border: none;
  font-weight: 600;
}

.btn {
  display: inline-block;
  padding: 0.8rem 1.4rem;
  font-weight: 700;
  background-color: black;
  color: white;
  border-radius: 5px;
  text-align: center;
  font-size: 1em;
}

.btn-open {
  position: absolute;
  bottom: 150px;
}

.btn-close {
  transform: translate(1250%, -10px);
  padding: 0.4rem 0.7rem;
  background: #eee;
  border-radius: 50%;
}

.overlay {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(3px);
  z-index: 1;
}

.hidden {
  display: none;

}
        </style>
    </head>
    <body>
       <section class="modal hidden">
        <div class="flex">
            <button class="btn-close">x</button> 
        </div>
        <div>
            <h3>Stay in touch!</h3>
            <p>Subscribe to my newsletter.</p>
        </div>
        <label for="email">Email</label>
        <input type="email" name="emial" id="email" placeholder="me@example.com">
        <button class="btn">Subcribe</button>
     
        <div>
          <p>
            <a href="https://buttondown.com" target="_blank">
              Powered by Buttondown.
            </a>
          </p>
        </div>
       </section> 
       <div class="overlay hidden"></div>
        <button class="btn btn-open">Subcribe to my newsletter</button>
        <script>
          const modal = document.querySelector(".modal");
          const overlay = document.querySelector(".overlay");
          const openModalBtn = document.querySelector(".btn-open");
          const closeModalBtn = document.querySelector(".btn-close");

          const openModal = function() {
            modal.classList.remove("hidden");
            overlay.classList.remove("hidden");
          };

          openModalBtn.addEventListener("click", openModal);

          const closeModal = function(){
            modal.classList.add("hidden");
            overlay.classList.add("hidden");
          };

          closeModalBtn.addEventListener("click", closeModal);

          overlay.addEventListener("click", closeModal);
        </script>
    </body>
</html>
