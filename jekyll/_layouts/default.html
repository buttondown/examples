<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
        line-height: 1.6;
      }
      .newsletter-form {
        background: #f5f5f5;
        padding: 2rem;
        border-radius: 8px;
        margin: 2rem 0;
      }
      .newsletter-form h3 {
        margin-top: 0;
      }
      .newsletter-form input[type="email"] {
        width: 100%;
        padding: 0.5rem;
        margin: 0.5rem 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
      }
      .newsletter-form button {
        background: #4CAF50;
        color: white;
        padding: 0.5rem 1.5rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      .newsletter-form button:hover {
        background: #45a049;
      }
      .newsletter-form button:disabled {
        background: #cccccc;
        cursor: not-allowed;
      }
      .status-message {
        margin-top: 1rem;
        padding: 0.5rem;
        border-radius: 4px;
      }
      .status-message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .status-message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1>{{ site.title | escape }}</h1>
      <nav>
        <a href="{{ "/" | relative_url }}">Home</a>
        <a href="{{ "/about/" | relative_url }}">About</a>
      </nav>
    </header>

    <main class="page-content" aria-label="Content">
      {{ content }}
    </main>

    <div class="newsletter-form">
      <h3>Subscribe to our Newsletter</h3>
      <p>Get the latest updates delivered to your inbox.</p>
      <form id="buttondown-form" action="https://buttondown.com/api/emails/embed-subscribe/{{ site.buttondown_username }}" method="post">
        <input type="email" id="bd-email" name="email" placeholder="Enter your email" required>
        <button type="submit" id="submit-btn">Subscribe</button>
        <div id="status-message" class="status-message" style="display: none;"></div>
      </form>
    </div>

    <footer class="site-footer">
      <p>&copy; {{ site.title }} {{ 'now' | date: "%Y" }}</p>
    </footer>

    <script>
      document.getElementById('buttondown-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('bd-email').value;
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Subscribing...';
        statusMessage.style.display = 'none';
        
        try {
          const response = await fetch(this.action, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `email=${encodeURIComponent(email)}`
          });
          
          if (response.ok) {
            statusMessage.textContent = 'Thanks for subscribing!';
            statusMessage.className = 'status-message success';
            statusMessage.style.display = 'block';
            document.getElementById('bd-email').value = '';
          } else {
            throw new Error('Subscription failed');
          }
        } catch (error) {
          statusMessage.textContent = 'Something went wrong. Please try again.';
          statusMessage.className = 'status-message error';
          statusMessage.style.display = 'block';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Subscribe';
        }
      });
    </script>
  </body>
</html>
