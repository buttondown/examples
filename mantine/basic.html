<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mantine Buttondown Example</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@mantine/core@7.3.0/dist/index.umd.js"></script>
    <script src="https://unpkg.com/@mantine/form@7.3.0/dist/index.umd.js"></script>
    <script src="https://unpkg.com/@mantine/hooks@7.3.0/dist/index.umd.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@mantine/core@7.3.0/styles.css" />
  </head>
  <body>
    <div id="root" style="max-width: 400px; margin: 50px auto; padding: 20px;"></div>

    <script type="text/babel">
      const { Button, TextInput, MantineProvider } = window.MantineCore;
      const { useForm, isEmail, hasLength } = window.MantineForm;

      function Demo() {
        const form = useForm({
          mode: "uncontrolled",
          initialValues: { name: "", email: "" },
          validate: {
            name: hasLength({ min: 3 }, "Must be at least 3 characters"),
            email: isEmail("Invalid email"),
          },
        });

        const handleSubmit = (values, event) => {
          const data = new FormData();
          data.append("name", values.name);
          data.append("email", values.email);
          fetch("https://buttondown.com/api/emails/embed-subscribe/{username}", {
            method: "POST",
            body: data,
          }).then((response) => console.log(response));
        };

        return (
          <form onSubmit={form.onSubmit(handleSubmit)}>
            <TextInput
              {...form.getInputProps("name")}
              key={form.key("name")}
              label="Name"
              placeholder="Name"
            />
            <TextInput
              {...form.getInputProps("email")}
              key={form.key("email")}
              mt="md"
              label="Email"
              placeholder="Email"
            />
            <Button type="submit" mt="md" fullWidth>
              Submit
            </Button>
          </form>
        );
      }

      function App() {
        return (
          <MantineProvider>
            <Demo />
          </MantineProvider>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
